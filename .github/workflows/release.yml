name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Verify tag matches package version
        run: |
          version="$(uvx hatchling version)"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
            exit 1
          fi

      - name: Build
        run: uv build

      # --check-url skips files already on PyPI so the job is safe to rerun
      # if a later step fails.
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/

      # A tag created via the Releases UI already has a release; just attach
      # the artifacts to it.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
          fi
